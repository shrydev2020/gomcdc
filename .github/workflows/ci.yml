name: CI

on:
  push:
    branches: [master]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: 1.26.x
          cache: true
      - run: go test -count=1 ./...
      - if: runner.os == 'Linux'
        run: go test -count=1 -race ./...
      - run: go vet ./...

  self-mcdc:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: 1.26.x
          cache: true
      - name: Verify gomcdc with its own MC/DC report
        run: >-
          go run . test
          --timeout=10m
          --coverage=decision,condition,mcdc-unique,mcdc-masking
          --strict
          --format=json
          --output=${{ runner.temp }}/gomcdc-self-mcdc.json
          ./...
      - name: Enforce critical-package MC/DC baselines
        env:
          GOMCDC_REPORT: ${{ runner.temp }}/gomcdc-self-mcdc.json
        run: |
          jq -er --slurpfile baseline .github/self-mcdc-baseline.json '
            def percentage($summary; $metric): $summary[$metric].percentage // 0;
            def display_percentage($actual):
              if $actual == null then "missing" else ($actual | tostring) + "%" end;
            def failure_message:
              "MC/DC baseline failed: \(.scope) \(.metric): actual \(display_percentage(.actual)), required \(.minimum)%";
            . as $report
            | $baseline[0] as $expected
            | [
                ($expected.module
                  | to_entries[]
                  | {
                      scope: "module",
                      metric: .key,
                      actual: percentage($report.summary; .key),
                      minimum: .value
                    }),
                ($expected.packages
                  | to_entries[] as $package
                  | ($report.packages | map(select(.path == $package.key)) | first) as $actual_package
                  | $package.value
                  | to_entries[]
                  | {
                      scope: $package.key,
                      metric: .key,
                      actual: (if $actual_package == null then null else percentage($actual_package.summary; .key) end),
                      minimum: .value
                    })
              ]
            | map(select(.actual == null or .actual < .minimum)) as $failures
            | if ($failures | length) == 0 then
                "All critical-package MC/DC baselines passed."
              else
                $failures
                | map(failure_message)
                | join("\n")
                | error
              end
          ' "$GOMCDC_REPORT"
