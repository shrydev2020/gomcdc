name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
          cache: true
      - run: go test -count=1 ./...
      - run: go test -count=1 -race ./...
      - run: go vet ./...

  self-mcdc:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
          cache: true
      - name: Verify gomcdc with its own MC/DC report
        run: >-
          go run ./cmd/gomcdc test
          --timeout=10m
          --coverage=decision,condition,mcdc-unique,mcdc-masking
          --strict
          --fail-under-decision=68
          --fail-under-condition=65
          --fail-under-mcdc-unique=40
          --fail-under-mcdc-masking=39
          --format=json
          --output=${{ runner.temp }}/gomcdc-self-mcdc.json
          ./...
