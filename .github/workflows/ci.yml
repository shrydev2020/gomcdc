name: CI

on:
  push:
    branches: [master]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: 1.26.x
          cache: true
      - run: go test -count=1 ./...
      - if: runner.os == 'Linux'
        run: go test -count=1 -race ./...
      - run: go vet ./...

  self-mcdc:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: 1.26.x
          cache: true
      - name: Verify gomcdc with its own MC/DC report
        run: >-
          go run . test
          --timeout=10m
          --coverage=decision,condition,mcdc-unique,mcdc-masking
          --strict
          --format=json
          --output=${{ runner.temp }}/gomcdc-self-mcdc.json
          ./...
      - name: Enforce critical-package MC/DC baselines
        env:
          GOMCDC_REPORT: ${{ runner.temp }}/gomcdc-self-mcdc.json
        run: |
          jq -e --slurpfile baseline .github/self-mcdc-baseline.json '
            def percentage($summary; $metric): $summary[$metric].percentage // 0;
            . as $report
            | $baseline[0] as $expected
            | ([
                $expected.module
                | to_entries[]
                | percentage($report.summary; .key) >= .value
              ] | all)
              and
              ([
                $expected.packages
                | to_entries[] as $package
                | ($report.packages | map(select(.path == $package.key)) | first) as $actual
                | $actual != null
                  and ([
                    $package.value
                    | to_entries[]
                    | percentage($actual.summary; .key) >= .value
                  ] | all)
              ] | all)
          ' "$GOMCDC_REPORT"
